openapi: 3.0.3
info:
  title: RecurringTransactionsAPI
  description: API for analyzing bank CSV exports, detecting recurring payments, and providing annual overview dashboards with predictions.
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /api/transactions/csv:
    post:
      operationId: uploadCsv
      summary: Upload a bank CSV file
      tags: [Transactions]
      parameters:
        - name: X-Csv-Charset
          in: header
          description: Charset used to decode the uploaded CSV file.
          required: false
          schema:
            type: string
            default: UTF-8
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, mapping]
              properties:
                file:
                  type: string
                  format: binary
                mapping:
                  type: string
                  description: JSON-serialized transaction CSV column mapping.
      responses:
        '200':
          description: Upload successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResponse'
        '400':
          description: Invalid CSV file
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/transactions:
    get:
      operationId: getTransactions
      summary: List transactions with optional filters
      tags: [Transactions]
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: text
          in: query
          description: Search in partner name and details (case-insensitive, partial match)
          schema:
            type: string
        - name: account
          in: query
          description: Filter by source account IBAN
          schema:
            type: string
        - name: transactionType
          in: query
          description: Filter transactions by analytical type
          schema:
            type: string
            default: ALL
            enum: [ALL, NON_INTER_ACCOUNT, REGULAR, ADDITIONAL]
        - name: transactionSign
          in: query
          description: Filter transactions by amount sign
          schema:
            type: string
            default: ALL
            enum: [ALL, POSITIVE, NEGATIVE]
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 50
        - name: sort
          in: query
          description: Field to sort by
          schema:
            type: string
            default: bookingDate
            enum: [bookingDate, partnerName, amount]
        - name: sortDirection
          in: query
          description: Sort direction
          schema:
            type: string
            default: desc
            enum: [asc, desc]
      responses:
        '200':
          description: Paginated list of transactions
          headers:
            X-Total-Items:
              description: Total number of items across all pages
              schema:
                type: integer
                format: int64
            X-Page:
              description: Current page number (zero-based)
              schema:
                type: integer
            X-Page-Size:
              description: Number of items per page
              schema:
                type: integer
            X-Total-Pages:
              description: Total number of pages
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionPage'

  /api/transactions/{id}:
    get:
      operationId: getTransactionById
      summary: Get a single transaction by ID
      tags: [Transactions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Transaction details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionDto'
        '404':
          description: Transaction not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/recurring-payments:
    get:
      operationId: getRecurringPayments
      summary: List all detected recurring payments
      tags: [RecurringPayments]
      parameters:
        - name: category
          in: query
          description: Filter recurring payments by category UUID or UNCATEGORIZED
          schema:
            type: string
      responses:
        '200':
          description: List of recurring payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RecurringPaymentDto'
    post:
      operationId: createRecurringPayment
      summary: Create a new recurring or grouped payment
      tags: [RecurringPayments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRecurringPaymentRequest'
      responses:
        '201':
          description: Payment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecurringPaymentDto'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/recurring-payments/recalculate:
    post:
      operationId: recalculateRecurringPayments
      summary: Recalculate inter-account transfers and recurring payments
      tags: [RecurringPayments]
      responses:
        '200':
          description: Recalculation completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecalculationSummaryResponse'

  /api/recurring-payments/simulate:
    post:
      operationId: simulateRecurringPayment
      summary: Simulate a draft recurring payment against unlinked transactions
      tags: [RecurringPayments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecurringPaymentSimulationRequest'
      responses:
        '200':
          description: Recurring payment simulation results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecurringPaymentSimulationResponse'

  /api/additional-rule-groups:
    get:
      operationId: getAdditionalRuleGroups
      summary: List Additional rule groups
      tags: [AdditionalRuleGroups]
      responses:
        '200':
          description: Additional rule groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdditionalRuleGroupDto'
    post:
      operationId: createAdditionalRuleGroup
      summary: Create an Additional rule group
      tags: [AdditionalRuleGroups]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdditionalRuleGroupRequest'
      responses:
        '201':
          description: Additional rule group created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdditionalRuleGroupMutationResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Duplicate group name
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/additional-rule-groups/simulate:
    post:
      operationId: simulateAdditionalRuleGroup
      summary: Simulate a draft Additional rule group
      tags: [AdditionalRuleGroups]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdditionalGroupSimulationRequest'
      responses:
        '200':
          description: Additional rule group simulation results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdditionalGroupSimulationResponse'

  /api/additional-rule-groups/{id}:
    get:
      operationId: getAdditionalRuleGroup
      summary: Get an Additional rule group
      tags: [AdditionalRuleGroups]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Additional rule group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdditionalRuleGroupDto'
        '404':
          description: Additional rule group not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: updateAdditionalRuleGroup
      summary: Update an Additional rule group
      tags: [AdditionalRuleGroups]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdditionalRuleGroupRequest'
      responses:
        '200':
          description: Additional rule group updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdditionalRuleGroupMutationResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Additional rule group not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Duplicate group name
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: deleteAdditionalRuleGroup
      summary: Delete an Additional rule group
      tags: [AdditionalRuleGroups]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Additional rule group deleted and matching recalculated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecalculationSummaryResponse'
        '404':
          description: Additional rule group not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/recurring-payments/{id}:
    put:
      operationId: updateRecurringPayment
      summary: Update a recurring payment
      tags: [RecurringPayments]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecurringPaymentUpdateRequest'
      responses:
        '200':
          description: Updated recurring payment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecurringPaymentDto'
        '404':
          description: Recurring payment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: deleteRecurringPayment
      summary: Delete a recurring payment
      tags: [RecurringPayments]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Payment deleted
        '404':
          description: Recurring payment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/recurring-payments/{id}/transactions:
    get:
      operationId: getRecurringPaymentTransactions
      summary: Get transactions linked to a recurring payment
      tags: [RecurringPayments]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of linked transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TransactionDto'

  /api/recurring-payments/{id}/history:
    get:
      operationId: getRecurringPaymentHistory
      summary: Get period amount history for a recurring payment
      tags: [RecurringPayments]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        '200':
          description: List of period history entries sorted by periodStart ascending
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PaymentPeriodHistoryEntry'
        '404':
          description: Recurring payment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/recurring-payments/{recurringPaymentId}/rules:
    get:
      operationId: getRules
      summary: List rules for a recurring payment
      tags: [RecurringPaymentRules]
      parameters:
        - name: recurringPaymentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RuleDto'
        '404':
          description: Recurring payment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: createRule
      summary: Create a new rule for a recurring payment
      tags: [RecurringPaymentRules]
      parameters:
        - name: recurringPaymentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRuleRequest'
      responses:
        '201':
          description: Rule created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuleDto'
        '400':
          description: Invalid rule configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Recurring payment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/recurring-payments/{recurringPaymentId}/rules/{ruleId}:
    put:
      operationId: updateRule
      summary: Update a rule
      tags: [RecurringPaymentRules]
      parameters:
        - name: recurringPaymentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: ruleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRuleRequest'
      responses:
        '200':
          description: Updated rule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuleDto'
        '404':
          description: Rule or recurring payment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: deleteRule
      summary: Delete a rule
      tags: [RecurringPaymentRules]
      parameters:
        - name: recurringPaymentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: ruleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Rule deleted
        '404':
          description: Rule or recurring payment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/recurring-payments/{recurringPaymentId}/re-evaluate:
    post:
      operationId: reEvaluateRecurringPayment
      summary: Re-evaluate a recurring payment against unlinked transactions
      tags: [RecurringPaymentRules]
      parameters:
        - name: recurringPaymentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Updated recurring payment after re-evaluation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecurringPaymentDto'
        '404':
          description: Recurring payment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/categories:
    get:
      operationId: getCategories
      summary: List all categories
      tags: [Categories]
      responses:
        '200':
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoryDto'
    post:
      operationId: createCategory
      summary: Create a new category
      tags: [Categories]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCategoryRequest'
      responses:
        '201':
          description: Category created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryDto'
        '409':
          description: Category with this name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/categories/{id}:
    get:
      operationId: getCategoryById
      summary: Get a single category by ID
      tags: [Categories]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Category details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryDto'
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: updateCategory
      summary: Update an existing category
      tags: [Categories]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCategoryRequest'
      responses:
        '200':
          description: Updated category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryDto'
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Category with this name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: deleteCategory
      summary: Delete a category
      tags: [Categories]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Category deleted
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/bank-accounts:
    get:
      operationId: getBankAccounts
      summary: List bank accounts for the current user
      tags: [BankAccounts]
      responses:
        '200':
          description: List of bank accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BankAccountDto'
    post:
      operationId: createBankAccount
      summary: Create a bank account for the current user
      tags: [BankAccounts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBankAccountRequest'
      responses:
        '201':
          description: Bank account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankAccountMutationResponse'
        '400':
          description: Invalid bank account request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/bank-accounts/{id}:
    put:
      operationId: updateBankAccount
      summary: Update a bank account
      tags: [BankAccounts]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBankAccountRequest'
      responses:
        '200':
          description: Updated bank account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankAccountDto'
        '404':
          description: Bank account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: deleteBankAccount
      summary: Delete a bank account
      tags: [BankAccounts]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Bank account deleted and recalculation completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecalculationSummaryResponse'
        '404':
          description: Bank account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/analytics/annual-overview:
    get:
      operationId: getAnnualOverview
      summary: Get annual financial overview
      tags: [Analytics]
      parameters:
        - name: year
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Annual overview data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnualOverview'

  /api/setup/status:
    get:
      operationId: getSetupStatus
      summary: Check if initial setup is needed
      tags: [Setup]
      responses:
        '200':
          description: Setup status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetupStatusResponse'

  /api/setup/init:
    post:
      operationId: initializeSetup
      summary: Create the first admin user (only works when no users exist)
      tags: [Setup]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetupRequest'
      responses:
        '200':
          description: Admin user created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserResponse'
        '409':
          description: Setup already completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/login:
    post:
      operationId: login
      summary: Authenticate with username and password
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/logout:
    post:
      operationId: logout
      summary: Log out the current user
      tags: [Auth]
      responses:
        '204':
          description: Logged out successfully

  /api/auth/me:
    get:
      operationId: getCurrentUser
      summary: Get the currently authenticated user
      tags: [Auth]
      responses:
        '200':
          description: Current user info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/account/password:
    put:
      operationId: changePassword
      summary: Change the current user's password
      tags: [Account]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '204':
          description: Password changed successfully
        '401':
          description: Invalid current password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/account/username:
    put:
      operationId: changeUsername
      summary: Change the current user's username
      tags: [Account]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeUsernameRequest'
      responses:
        '200':
          description: Username changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserResponse'
        '409':
          description: Username already taken
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/admin/users:
    get:
      operationId: listUsers
      summary: List all users (admin only)
      tags: [AdminUsers]
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminUserDto'
    post:
      operationId: createUser
      summary: Create a new user (admin only)
      tags: [AdminUsers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserDto'
        '409':
          description: Username already taken
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/admin/users/{id}:
    put:
      operationId: updateUser
      summary: Update a user (admin only)
      tags: [AdminUsers]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserDto'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Username already taken
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/analytics/predictions:
    get:
      operationId: getPredictions
      summary: Get upcoming payment predictions
      tags: [Analytics]
      parameters:
        - name: months
          in: query
          schema:
            type: integer
            default: 6
      responses:
        '200':
          description: Prediction data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PredictionResponse'

components:
  schemas:
    ErrorResponse:
      type: object
      required: [status, message, timestamp]
      properties:
        status:
          type: integer
        message:
          type: string
        timestamp:
          type: string
          format: date-time

    UserRole:
      type: string
      enum: [USER, ADMIN]

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    CurrentUserResponse:
      type: object
      required: [id, username, role]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'

    SetupRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    SetupStatusResponse:
      type: object
      required: [needsSetup]
      properties:
        needsSetup:
          type: boolean

    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string

    ChangeUsernameRequest:
      type: object
      required: [newUsername]
      properties:
        newUsername:
          type: string

    AdminUserDto:
      type: object
      required: [id, username, role, enabled]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'
        enabled:
          type: boolean

    CreateUserRequest:
      type: object
      required: [username, password, role]
      properties:
        username:
          type: string
        password:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'

    UpdateUserRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'
        enabled:
          type: boolean

    UploadResponse:
      type: object
      required: [uploadId, transactionCount, skippedDuplicates, recurringPaymentsDetected]
      properties:
        uploadId:
          type: string
          format: uuid
        transactionCount:
          type: integer
        skippedDuplicates:
          type: integer
        recurringPaymentsDetected:
          type: integer
        transactionsMarkedInterAccount:
          type: integer
          nullable: true
        transactionLinksRemoved:
          type: integer
          nullable: true
        recurringPaymentsDeleted:
          type: integer
          nullable: true
        recalculationRecurringPaymentsDetected:
          type: integer
          nullable: true

    RecalculationSummaryResponse:
      type: object
      required: [transactionsMarkedInterAccount, transactionLinksRemoved, recurringPaymentsDeleted, recurringPaymentsDetected]
      properties:
        transactionsMarkedInterAccount:
          type: integer
        transactionLinksRemoved:
          type: integer
        recurringPaymentsDeleted:
          type: integer
        recurringPaymentsDetected:
          type: integer

    BankAccountMutationResponse:
      type: object
      required: [bankAccount, recalculationSummary]
      properties:
        bankAccount:
          $ref: '#/components/schemas/BankAccountDto'
        recalculationSummary:
          $ref: '#/components/schemas/RecalculationSummaryResponse'

    TransactionCsvImportMapping:
      type: object
      required: [bookingDate, amount]
      properties:
        bookingDate:
          type: string
          description: Source CSV header mapped to booking date.
        amount:
          type: string
          description: Source CSV header mapped to amount.
        account:
          type: string
          nullable: true
          description: Source CSV header mapped to the transaction's own account IBAN.
        partnerName:
          type: string
          nullable: true
          description: Source CSV header mapped to partner name.
        partnerIban:
          type: string
          nullable: true
          description: Source CSV header mapped to partner IBAN.
        details:
          type: string
          nullable: true
          description: Source CSV header mapped to details.
        detailsFallback:
          type: string
          nullable: true
          description: Optional source CSV header used only when details is blank.

    TransactionDto:
      type: object
      required: [id, bookingDate, amount]
      properties:
        id:
          type: string
          format: uuid
        uploadId:
          type: string
          format: uuid
        bookingDate:
          type: string
          format: date
        account:
          $ref: '#/components/schemas/BankAccountDto'
        partnerName:
          type: string
        partnerIban:
          type: string
        amount:
          type: number
          format: double
        currency:
          type: string
        details:
          type: string
        isInterAccount:
          type: boolean
        linkedPaymentCount:
          type: integer
        linkedPaymentNames:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time

    TransactionPage:
      type: object
      required: [content, totalElements, totalPages, filteredSum]
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/TransactionDto'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        filteredSum:
          type: number

    CategoryDto:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        color:
          type: string

    BankAccountDto:
      type: object
      required: [id, iban]
      properties:
        id:
          type: string
          format: uuid
        iban:
          type: string
        name:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateBankAccountRequest:
      type: object
      required: [iban]
      properties:
        iban:
          type: string
        name:
          type: string
          nullable: true

    UpdateBankAccountRequest:
      type: object
      properties:
        name:
          type: string
          nullable: true

    CreateCategoryRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        color:
          type: string

    UpdateCategoryRequest:
      type: object
      properties:
        name:
          type: string
        color:
          type: string

    Frequency:
      type: string
      enum: [MONTHLY, QUARTERLY, YEARLY]

    RuleType:
      type: string
      enum: [REGEX, JARO_WINKLER, AMOUNT]

    TargetField:
      type: string
      enum: [ACCOUNT, PARTNER_NAME, PARTNER_IBAN, DETAILS]

    RuleDto:
      type: object
      required: [id, ruleType]
      properties:
        id:
          type: string
          format: uuid
        ruleType:
          $ref: '#/components/schemas/RuleType'
        targetField:
          $ref: '#/components/schemas/TargetField'
        text:
          type: string
        strict:
          type: boolean
        threshold:
          type: number
          format: double
        amount:
          type: number
          format: double
        fluctuationRange:
          type: number
          format: double

    CreateRuleRequest:
      type: object
      required: [ruleType]
      properties:
        ruleType:
          $ref: '#/components/schemas/RuleType'
        targetField:
          $ref: '#/components/schemas/TargetField'
        text:
          type: string
        strict:
          type: boolean
        threshold:
          type: number
          format: double
        amount:
          type: number
          format: double
        fluctuationRange:
          type: number
          format: double

    UpdateRuleRequest:
      type: object
      properties:
        targetField:
          $ref: '#/components/schemas/TargetField'
        text:
          type: string
        strict:
          type: boolean
        threshold:
          type: number
          format: double
        amount:
          type: number
          format: double
        fluctuationRange:
          type: number
          format: double

    PaymentType:
      type: string
      enum: [RECURRING, GROUPED]

    RecurringPaymentDto:
      type: object
      required: [id, name, averageAmount, frequency, isIncome, isActive, ruleCount, paymentType]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        categoryId:
          type: string
          format: uuid
        categoryName:
          type: string
        categoryColor:
          type: string
        averageAmount:
          type: number
          format: double
        frequency:
          $ref: '#/components/schemas/Frequency'
        paymentType:
          $ref: '#/components/schemas/PaymentType'
        isIncome:
          type: boolean
        isActive:
          type: boolean
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        ruleCount:
          type: integer

    RecurringPaymentUpdateRequest:
      type: object
      properties:
        categoryId:
          type: string
          format: uuid
        name:
          type: string
        isActive:
          type: boolean
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
          nullable: true
        clearEndDate:
          type: boolean

    AnnualOverview:
      type: object
      required: [totalIncome, totalExpenses, totalRecurringIncome, totalRecurringExpenses, monthlyBreakdown, byCategory, recurringExpenses, recurringIncome]
      properties:
        totalIncome:
          type: number
          format: double
        totalExpenses:
          type: number
          format: double
        totalRecurringIncome:
          type: number
          format: double
        totalRecurringExpenses:
          type: number
          format: double
        monthlyBreakdown:
          type: array
          items:
            $ref: '#/components/schemas/MonthlyBreakdown'
        byCategory:
          type: array
          items:
            $ref: '#/components/schemas/CategoryBreakdown'
        recurringExpenses:
          type: array
          items:
            $ref: '#/components/schemas/RecurringPaymentSummary'
        recurringIncome:
          type: array
          items:
            $ref: '#/components/schemas/RecurringPaymentSummary'

    MonthlyBreakdown:
      type: object
      required: [month, income, expenses, surplus, recurringExpenses]
      properties:
        month:
          type: integer
        income:
          type: number
          format: double
        expenses:
          type: number
          format: double
        surplus:
          type: number
          format: double
        recurringExpenses:
          type: number
          format: double

    CategoryBreakdown:
      type: object
      required: [category, total, percentage]
      properties:
        categoryId:
          type: string
          format: uuid
        category:
          type: string
        total:
          type: number
          format: double
        percentage:
          type: number
          format: double
        color:
          type: string

    RecurringPaymentSummary:
      type: object
      required: [id, name, monthlyAmount, annualAmount, category]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        monthlyAmount:
          type: number
          format: double
        annualAmount:
          type: number
          format: double
        category:
          type: string

    PredictionResponse:
      type: object
      required: [predictions, upcomingPayments]
      properties:
        predictions:
          type: array
          items:
            $ref: '#/components/schemas/MonthlyPrediction'
        upcomingPayments:
          type: array
          items:
            $ref: '#/components/schemas/UpcomingPayment'

    MonthlyPrediction:
      type: object
      required: [month, expectedIncome, expectedExpenses, expectedSurplus, recurringIncome, recurringExpenses, additionalIncome, additionalExpenses]
      properties:
        month:
          type: string
        expectedIncome:
          type: number
          format: double
        expectedExpenses:
          type: number
          format: double
        expectedSurplus:
          type: number
          format: double
        recurringIncome:
          type: number
          format: double
        recurringExpenses:
          type: number
          format: double
        additionalIncome:
          type: number
          format: double
        additionalExpenses:
          type: number
          format: double

    UpcomingPayment:
      type: object
      required: [name, date, amount]
      properties:
        name:
          type: string
        date:
          type: string
        amount:
          type: number
          format: double

    CreateRecurringPaymentRequest:
      type: object
      required: [name, paymentType, frequency, rules]
      properties:
        name:
          type: string
        paymentType:
          $ref: '#/components/schemas/PaymentType'
        frequency:
          $ref: '#/components/schemas/Frequency'
        rules:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CreateRuleRequest'

    RecurringPaymentSimulationRequest:
      type: object
      required: [rules]
      properties:
        rules:
          type: array
          items:
            $ref: '#/components/schemas/CreateRuleRequest'

    AdditionalGroupSimulationRequest:
      type: object
      required: [rules]
      properties:
        currentAdditionalGroupId:
          type: string
          format: uuid
        rules:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CreateRuleRequest'

    RecurringPaymentSimulationResponse:
      type: object
      required: [matchingTransactions, totalMatchCount, omittedAdditionalMatchCount, omittedAdditionalMatches, overlappingPayments]
      properties:
        matchingTransactions:
          type: array
          items:
            $ref: '#/components/schemas/TransactionDto'
        totalMatchCount:
          type: integer
        omittedAdditionalMatchCount:
          type: integer
        omittedAdditionalMatches:
          type: array
          items:
            $ref: '#/components/schemas/AdditionalGroupTransactionMatchDto'
        overlappingPayments:
          type: array
          items:
            $ref: '#/components/schemas/OverlappingPaymentDto'

    AdditionalGroupSimulationResponse:
      type: object
      required: [matchingTransactions, totalMatchCount, uniqueExclusionCount, otherAdditionalGroupMatches]
      properties:
        matchingTransactions:
          type: array
          items:
            $ref: '#/components/schemas/TransactionDto'
        totalMatchCount:
          type: integer
        uniqueExclusionCount:
          type: integer
        otherAdditionalGroupMatches:
          type: array
          items:
            $ref: '#/components/schemas/AdditionalGroupTransactionMatchDto'

    AdditionalRuleGroupRequest:
      type: object
      required: [name, rules]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        rules:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CreateRuleRequest'

    AdditionalRuleGroupDto:
      type: object
      required: [id, name, normalizedName, rules, excludedTransactionCount, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        normalizedName:
          type: string
        rules:
          type: array
          items:
            $ref: '#/components/schemas/RuleDto'
        excludedTransactionCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AdditionalRuleGroupMutationResponse:
      type: object
      required: [group]
      properties:
        group:
          $ref: '#/components/schemas/AdditionalRuleGroupDto'
        recalculationSummary:
          $ref: '#/components/schemas/RecalculationSummaryResponse'

    AdditionalGroupReferenceDto:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string

    AdditionalGroupTransactionMatchDto:
      type: object
      required: [transactionId, groups]
      properties:
        transactionId:
          type: string
          format: uuid
        transaction:
          $ref: '#/components/schemas/TransactionDto'
        groups:
          type: array
          items:
            $ref: '#/components/schemas/AdditionalGroupReferenceDto'

    OverlappingPaymentDto:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string

    PaymentPeriodHistoryEntry:
      type: object
      required: [id, periodStart, periodEnd, amount]
      properties:
        id:
          type: string
          format: uuid
        periodStart:
          type: string
          format: date
        periodEnd:
          type: string
          format: date
        amount:
          type: number
          format: double
