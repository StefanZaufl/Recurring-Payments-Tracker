openapi: 3.0.3
info:
  title: RecurringTransactionsAPI
  description: API for analyzing bank CSV exports, detecting recurring payments, and providing annual overview dashboards with predictions.
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /api/transactions/csv:
    post:
      operationId: uploadCsv
      summary: Upload a bank CSV file
      tags: [Transactions]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Upload successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResponse'
        '400':
          description: Invalid CSV file
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/transactions:
    get:
      operationId: getTransactions
      summary: List transactions with optional filters
      tags: [Transactions]
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: text
          in: query
          description: Search in partner name and details (case-insensitive, partial match)
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 50
        - name: sort
          in: query
          description: Field to sort by
          schema:
            type: string
            default: bookingDate
            enum: [bookingDate, partnerName, amount]
        - name: sortDirection
          in: query
          description: Sort direction
          schema:
            type: string
            default: desc
            enum: [asc, desc]
      responses:
        '200':
          description: Paginated list of transactions
          headers:
            X-Total-Items:
              description: Total number of items across all pages
              schema:
                type: integer
                format: int64
            X-Page:
              description: Current page number (zero-based)
              schema:
                type: integer
            X-Page-Size:
              description: Number of items per page
              schema:
                type: integer
            X-Total-Pages:
              description: Total number of pages
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionPage'

  /api/transactions/{id}:
    get:
      operationId: getTransactionById
      summary: Get a single transaction by ID
      tags: [Transactions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Transaction details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionDto'
        '404':
          description: Transaction not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/recurring-payments:
    get:
      operationId: getRecurringPayments
      summary: List all detected recurring payments
      tags: [RecurringPayments]
      responses:
        '200':
          description: List of recurring payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RecurringPaymentDto'

  /api/recurring-payments/{id}:
    put:
      operationId: updateRecurringPayment
      summary: Update a recurring payment
      tags: [RecurringPayments]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecurringPaymentUpdateRequest'
      responses:
        '200':
          description: Updated recurring payment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecurringPaymentDto'
        '404':
          description: Recurring payment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/recurring-payments/{id}/transactions:
    get:
      operationId: getRecurringPaymentTransactions
      summary: Get transactions linked to a recurring payment
      tags: [RecurringPayments]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of linked transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TransactionDto'

  /api/recurring-payments/{recurringPaymentId}/rules:
    get:
      operationId: getRules
      summary: List rules for a recurring payment
      tags: [RecurringPaymentRules]
      parameters:
        - name: recurringPaymentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RuleDto'
        '404':
          description: Recurring payment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: createRule
      summary: Create a new rule for a recurring payment
      tags: [RecurringPaymentRules]
      parameters:
        - name: recurringPaymentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRuleRequest'
      responses:
        '201':
          description: Rule created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuleDto'
        '400':
          description: Invalid rule configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Recurring payment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/recurring-payments/{recurringPaymentId}/rules/{ruleId}:
    put:
      operationId: updateRule
      summary: Update a rule
      tags: [RecurringPaymentRules]
      parameters:
        - name: recurringPaymentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: ruleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRuleRequest'
      responses:
        '200':
          description: Updated rule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuleDto'
        '404':
          description: Rule or recurring payment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: deleteRule
      summary: Delete a rule
      tags: [RecurringPaymentRules]
      parameters:
        - name: recurringPaymentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: ruleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Rule deleted
        '404':
          description: Rule or recurring payment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/recurring-payments/{recurringPaymentId}/re-evaluate:
    post:
      operationId: reEvaluateRecurringPayment
      summary: Re-evaluate a recurring payment against unlinked transactions
      tags: [RecurringPaymentRules]
      parameters:
        - name: recurringPaymentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Updated recurring payment after re-evaluation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecurringPaymentDto'
        '404':
          description: Recurring payment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/categories:
    get:
      operationId: getCategories
      summary: List all categories
      tags: [Categories]
      responses:
        '200':
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoryDto'
    post:
      operationId: createCategory
      summary: Create a new category
      tags: [Categories]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCategoryRequest'
      responses:
        '201':
          description: Category created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryDto'
        '409':
          description: Category with this name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/categories/{id}:
    get:
      operationId: getCategoryById
      summary: Get a single category by ID
      tags: [Categories]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Category details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryDto'
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: updateCategory
      summary: Update an existing category
      tags: [Categories]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCategoryRequest'
      responses:
        '200':
          description: Updated category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryDto'
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Category with this name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: deleteCategory
      summary: Delete a category
      tags: [Categories]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Category deleted
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/analytics/annual-overview:
    get:
      operationId: getAnnualOverview
      summary: Get annual financial overview
      tags: [Analytics]
      parameters:
        - name: year
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Annual overview data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnualOverview'

  /api/analytics/predictions:
    get:
      operationId: getPredictions
      summary: Get upcoming payment predictions
      tags: [Analytics]
      parameters:
        - name: months
          in: query
          schema:
            type: integer
            default: 6
      responses:
        '200':
          description: Prediction data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PredictionResponse'

components:
  schemas:
    ErrorResponse:
      type: object
      required: [status, message, timestamp]
      properties:
        status:
          type: integer
        message:
          type: string
        timestamp:
          type: string
          format: date-time

    UploadResponse:
      type: object
      required: [uploadId, transactionCount, recurringPaymentsDetected]
      properties:
        uploadId:
          type: string
          format: uuid
        transactionCount:
          type: integer
        recurringPaymentsDetected:
          type: integer

    TransactionDto:
      type: object
      required: [id, bookingDate, amount]
      properties:
        id:
          type: string
          format: uuid
        uploadId:
          type: string
          format: uuid
        bookingDate:
          type: string
          format: date
        partnerName:
          type: string
        partnerIban:
          type: string
        amount:
          type: number
          format: double
        currency:
          type: string
        details:
          type: string
        createdAt:
          type: string
          format: date-time

    TransactionPage:
      type: object
      required: [content, totalElements, totalPages]
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/TransactionDto'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer

    CategoryDto:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        color:
          type: string

    CreateCategoryRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        color:
          type: string

    UpdateCategoryRequest:
      type: object
      properties:
        name:
          type: string
        color:
          type: string

    Frequency:
      type: string
      enum: [MONTHLY, QUARTERLY, YEARLY]

    RuleType:
      type: string
      enum: [REGEX, JARO_WINKLER, AMOUNT]

    TargetField:
      type: string
      enum: [PARTNER_NAME, PARTNER_IBAN, DETAILS]

    RuleDto:
      type: object
      required: [id, ruleType]
      properties:
        id:
          type: string
          format: uuid
        ruleType:
          $ref: '#/components/schemas/RuleType'
        targetField:
          $ref: '#/components/schemas/TargetField'
        text:
          type: string
        strict:
          type: boolean
        threshold:
          type: number
          format: double
        amount:
          type: number
          format: double
        fluctuationRange:
          type: number
          format: double

    CreateRuleRequest:
      type: object
      required: [ruleType]
      properties:
        ruleType:
          $ref: '#/components/schemas/RuleType'
        targetField:
          $ref: '#/components/schemas/TargetField'
        text:
          type: string
        strict:
          type: boolean
        threshold:
          type: number
          format: double
        amount:
          type: number
          format: double
        fluctuationRange:
          type: number
          format: double

    UpdateRuleRequest:
      type: object
      properties:
        targetField:
          $ref: '#/components/schemas/TargetField'
        text:
          type: string
        strict:
          type: boolean
        threshold:
          type: number
          format: double
        amount:
          type: number
          format: double
        fluctuationRange:
          type: number
          format: double

    RecurringPaymentDto:
      type: object
      required: [id, name, averageAmount, frequency, isIncome, isActive, ruleCount]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        categoryId:
          type: string
          format: uuid
        categoryName:
          type: string
        averageAmount:
          type: number
          format: double
        frequency:
          $ref: '#/components/schemas/Frequency'
        isIncome:
          type: boolean
        isActive:
          type: boolean
        ruleCount:
          type: integer

    RecurringPaymentUpdateRequest:
      type: object
      properties:
        categoryId:
          type: string
          format: uuid
        name:
          type: string
        isActive:
          type: boolean

    AnnualOverview:
      type: object
      required: [totalIncome, totalExpenses, totalRecurringExpenses, monthlyBreakdown, byCategory, recurringPayments]
      properties:
        totalIncome:
          type: number
          format: double
        totalExpenses:
          type: number
          format: double
        totalRecurringExpenses:
          type: number
          format: double
        monthlyBreakdown:
          type: array
          items:
            $ref: '#/components/schemas/MonthlyBreakdown'
        byCategory:
          type: array
          items:
            $ref: '#/components/schemas/CategoryBreakdown'
        recurringPayments:
          type: array
          items:
            $ref: '#/components/schemas/RecurringPaymentSummary'

    MonthlyBreakdown:
      type: object
      required: [month, income, expenses, surplus]
      properties:
        month:
          type: integer
        income:
          type: number
          format: double
        expenses:
          type: number
          format: double
        surplus:
          type: number
          format: double

    CategoryBreakdown:
      type: object
      required: [category, total, percentage]
      properties:
        category:
          type: string
        total:
          type: number
          format: double
        percentage:
          type: number
          format: double

    RecurringPaymentSummary:
      type: object
      required: [name, monthlyAmount, annualAmount, category]
      properties:
        name:
          type: string
        monthlyAmount:
          type: number
          format: double
        annualAmount:
          type: number
          format: double
        category:
          type: string

    PredictionResponse:
      type: object
      required: [predictions, upcomingPayments]
      properties:
        predictions:
          type: array
          items:
            $ref: '#/components/schemas/MonthlyPrediction'
        upcomingPayments:
          type: array
          items:
            $ref: '#/components/schemas/UpcomingPayment'

    MonthlyPrediction:
      type: object
      required: [month, expectedIncome, expectedExpenses, expectedSurplus]
      properties:
        month:
          type: string
        expectedIncome:
          type: number
          format: double
        expectedExpenses:
          type: number
          format: double
        expectedSurplus:
          type: number
          format: double

    UpcomingPayment:
      type: object
      required: [name, date, amount]
      properties:
        name:
          type: string
        date:
          type: string
        amount:
          type: number
          format: double
